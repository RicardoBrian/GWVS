      --accent-hover: #0077ed;

      --success: #34c759;
      --success-light: rgba(52, 199, 89, 0.08);

    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-gradient: radial-gradient(circle at 0% 0%, #121214 0%, #17171c 50%, #1b1622 100%);

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--text-primary);
      overflow-x: hidden;
      transition: background 0.3s ease;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-edge);
      border-left: 1px solid var(--glass-edge);
      box-shadow: var(--glass-shadow);

    /* 포커스 링 스타일 */

    /* 스크롤바 커스텀 */

      { id: 's20', grade: 3, class: 3, number: 2, neisName: "IUSHKEVICH POLINA", name: "폴리나", helperName: "급식 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's21', grade: 3, class: 3, number: 3, neisName: "JIN PINWAN", name: "근품만", helperName: "급식 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's22', grade: 3, class: 3, number: 4, neisName: "KHON SAFIRA", name: "홍사피라", helperName: "분리수거장 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's23', grade: 3, class: 3, number: 5, neisName: "KIM MAXIMILYAN MARATOVICH", name: "김막심", helperName: "급식 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's24', grade: 3, class: 3, number: 6, neisName: "KVON ARTYOM", name: "권아르쫌", helperName: "급식 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's25', grade: 3, class: 3, number: 7, neisName: "LI DONGRAN", name: "이동염", helperName: "급식 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's26', grade: 3, class: 3, number: 8, neisName: "SONG GUANXU", name: "송관욱", helperName: "특별실 분리수거 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's27', grade: 3, class: 3, number: 9, neisName: "XU NUOWEN", name: "허라문", helperName: "특별실 분리수거 도우미", hours: 5, originalHours: 5, reason: "" }
    ];

    function App() {
      // 권한 상태 관리
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false); // 9600 비밀번호 관리자 모드 여부
      const [password, setPassword] = useState("");
      const [passwordError, setPasswordError] = useState("");
      
      // 관리자 게이트 모달 상태
      const [isAdminGateOpen, setIsAdminGateOpen] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState("");
      const [adminPasswordError, setAdminPasswordError] = useState("");

      const [students, setStudents] = useState([]);
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedGradeClass, setSelectedGradeClass] = useState("all");
      const [selectedHelper, setSelectedHelper] = useState("all");
      
      // 봉사시간 수정 내역 보관 로그 상태
      const [editLogs, setEditLogs] = useState([]);

      // 도우미 수동 추가 폼 상태 (관리자 전용)
      const [newStudent, setNewStudent] = useState({
        grade: "", class: "", number: "", neisName: "", name: "", helperName: "급식 도우미", hours: 5
      });

      // 모달 편집 상태
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingStudent, setEditingStudent] = useState(null);
      const [editHours, setEditHours] = useState(0);
      const [editReason, setEditReason] = useState("");
      const [feedbackMsg, setFeedbackMsg] = useState("");

      // 로컬 알림 상태
      const [alertToast, setAlertToast] = useState(null);

      // 시간 라이브 이펙트
      const [liveTime, setLiveTime] = useState("");

      // 초기 마운트 시 인증 세션 및 데이터 복원
      useEffect(() => {
        const isAuth = sessionStorage.getItem("portal_auth");
        if (isAuth === "true") {
          setIsAuthenticated(true);
        }
        
        const isAdminSession = sessionStorage.getItem("portal_admin_auth");
        if (isAdminSession === "true") {
          setIsAdmin(true);
        }

        const savedData = localStorage.getItem("helper_students_data_v3");
        if (savedData) {
          try {
            setStudents(JSON.parse(savedData));
          } catch(e) {
            setStudents(DEFAULT_STUDENTS);
          }
        } else {
          setStudents(DEFAULT_STUDENTS);
        }

        // 로그 기록 로드
        const savedLogs = localStorage.getItem("helper_students_logs_v3");
        if (savedLogs) {
          try {
            setEditLogs(JSON.parse(savedLogs));
          } catch(e) {
            setEditLogs([]);
          }
        }

        const updateClock = () => {
          const now = new Date();
          setLiveTime(now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
        };
        updateClock();
        const interval = setInterval(updateClock, 1000);
        return () => clearInterval(interval);
      }, []);

      const triggerToast = (msg, type = "success") => {
        setAlertToast({ msg, type });
        setTimeout(() => setAlertToast(null), 3000);
      };

      // 마스터 포탈 로그인 (1985)
      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (password === "1985") {
          setIsAuthenticated(true);
          sessionStorage.setItem("portal_auth", "true");
          triggerToast("인증 성공! 일반 포탈로 진입합니다.", "success");
        } else {
          setPasswordError("올바르지 않은 마스터 비밀번호입니다.");
          triggerToast("인증 실패", "danger");
        }
      };

      // 관리자 게이트 비밀번호 검증 (9600)
      const handleAdminVerify = (e) => {
        e.preventDefault();
        if (adminPasswordInput === "9600") {
          setIsAdmin(true);
          setIsAdminGateOpen(false);
          setAdminPasswordInput("");
          setAdminPasswordError("");
          sessionStorage.setItem("portal_admin_auth", "true");
          triggerToast("관리자 권한이 활성화되었습니다.", "success");
        } else {
          setAdminPasswordError("관리자 비밀번호가 일치하지 않습니다.");
          triggerToast("관리자 인증 실패", "danger");
        }
      };

      const updateStudentsState = (newStudents) => {
        setStudents(newStudents);
        localStorage.setItem("helper_students_data_v3", JSON.stringify(newStudents));
      };

      const saveLog = (studentName, originalHours, newHours, reason, operator = "일반 사용자") => {
        const newLog = {
          id: `log_${Date.now()}`,
          timestamp: new Date().toLocaleString('ko-KR'),
          studentName,
          originalHours,
          newHours,
          reason,
          operator
        };
        const updatedLogs = [newLog, ...editLogs];
        setEditLogs(updatedLogs);
        localStorage.setItem("helper_students_logs_v3", JSON.stringify(updatedLogs));
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setIsAdmin(false);
        sessionStorage.removeItem("portal_auth");
        sessionStorage.removeItem("portal_admin_auth");
        setPassword("");
        setPasswordError("");
        triggerToast("접속을 안전하게 종료했습니다.");
      };

      const handleExitAdminMode = () => {
        setIsAdmin(false);
        sessionStorage.removeItem("portal_admin_auth");
        triggerToast("관리자 모드를 해제하고 일반 대시보드로 돌아갑니다.");
      };

      const handleResetData = () => {
        if (window.confirm("정말로 모든 수정 데이터를 버리고 시트 기본 정보로 전체 초기화하시겠습니까?")) {
          updateStudentsState(DEFAULT_STUDENTS);
          setEditLogs([]);
          localStorage.removeItem("helper_students_logs_v3");
          triggerToast("모든 정보가 기본 초기값으로 리셋되었습니다.", "success");
        }
      };

      // CSV 임포트 핸들러 (관리자 전용)
      const handleCsvImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            const data = results.data;
            if (data.length === 0) {
              triggerToast("비어있거나 형식에 맞지 않는 파일입니다.", "danger");
              return;
            }

            try {
              const formatted = data.map((row, idx) => {
                const getVal = (candidates) => {
                  const match = Object.keys(row).find(k => candidates.some(c => k.trim().replace(/\s/g, '').includes(c)));
                  return match ? row[match].trim() : "";
                };

                const parsedGrade = parseInt(getVal(["학년", "grade"])) || 1;
                const parsedClass = parseInt(getVal(["반", "class"])) || 1;
                const parsedNum = parseInt(getVal(["번호", "number", "no"])) || 1;
                const parsedHours = parseInt(getVal(["봉사시간", "시간", "hours"])) || 5;

                return {
                  id: `csv_${idx}_${Date.now()}`,
                  grade: parsedGrade,
                  class: parsedClass,
                  number: parsedNum,
                  neisName: getVal(["나이스성명", "영문성명", "neis"]),
                  name: getVal(["한글이름", "이름", "name"]),
                  helperName: getVal(["도우미명", "도우미역할", "도우미", "role"]) || "일반 도우미",
                  hours: parsedHours,
                  originalHours: parsedHours,
                  reason: getVal(["봉사시간변경사유", "변경사유", "사유", "reason"]) || ""
                };
              });

              updateStudentsState(formatted);
              triggerToast(`성공적으로 ${formatted.length}명의 도우미 명단을 연동했습니다.`, "success");
            } catch (err) {
              console.error(err);
              triggerToast("CSV 데이터 파싱 중 오류가 발생했습니다.", "danger");
            }
          },
          error: (err) => {
            triggerToast("파일 로드 에러", "danger");
          }
        });
      };

      // CSV 내보내기 다운로드
      const handleCsvExport = () => {
        if (students.length === 0) {
          triggerToast("출력할 데이터가 존재하지 않습니다.", "danger");
          return;
        }

        const csvHeaders = ["학년", "반", "번호", "나이스 성명", "한글 이름", "도우미명", "봉사시간", "봉사시간 변경 사유"];
        const rows = students.map(s => [
          s.grade,
          s.class,
          s.number,
          s.neisName,
          s.name,
          s.helperName,
          s.hours,
          s.reason || ""
        ]);

        const csvContent = [csvHeaders, ...rows].map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `도우미_봉사시간_마스터조정본_${new Date().toISOString().slice(0, 10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("최종 수정본 CSV 다운로드를 완료했습니다.");
      };

      // 학생 직접 추가 (관리자 전용)
      const handleAddStudent = (e) => {
        e.preventDefault();
        if (!newStudent.grade || !newStudent.class || !newStudent.number || !newStudent.name) {
          triggerToast("필수 학생 인적 사항을 채워주세요.", "danger");
          return;
        }

        const added = {
          id: `manual_${Date.now()}`,
          grade: Number(newStudent.grade),
          class: Number(newStudent.class),

          helperName: newStudent.helperName,
          hours: Number(newStudent.hours),
          originalHours: Number(newStudent.hours),
          reason: ""

        const updated = [...students, added];
        updateStudentsState(updated);

          grade: "", class: "", number: "", neisName: "", name: "", helperName: "급식 도우미", hours: 5

      // 학생 삭제 (관리자 전용)
      const handleDeleteStudent = (id, name) => {
        if (window.confirm(`${name} 도우미를 명단에서 완전히 영구 배제하시겠습니까?`)) {
          const updated = students.filter(s => s.id !== id);
          updateStudentsState(updated);
          triggerToast(`${name} 학생이 명단에서 제외되었습니다.`, "danger");
        }
      };

      // 학급별 고유 리스트 가공
      const uniqueClasses = useMemo(() => {
        const classes = students.map(s => `${s.grade}학년 ${s.class}반`);
        return ["all", ...new Set(classes)].sort((a, b) => {
          if (a === "all") return -1;
          if (b === "all") return 1;
          return a.localeCompare(b, 'ko', { numeric: true });
        });
      }, [students]);

      // 도우미명 목록 고유 리스트 가공
      const uniqueHelpers = useMemo(() => {
        const helpers = students.map(s => s.helperName).filter(Boolean);
        return ["all", ...new Set(helpers)];
      }, [students]);

      // 검색 및 필터링 학생 추출
      const filteredStudents = useMemo(() => {
        return students.filter(s => {
          if (selectedGradeClass !== "all") {
            const classStr = `${s.grade}학년 ${s.class}반`;
            if (classStr !== selectedGradeClass) return false;
          }
          if (selectedHelper !== "all" && s.helperName !== selectedHelper) {
            return false;
          }
          if (searchQuery.trim() !== "") {
            const query = searchQuery.toLowerCase();
            const matchName = s.name.toLowerCase().includes(query);
            const matchNeis = s.neisName.toLowerCase().includes(query);
            const matchHelper = s.helperName.toLowerCase().includes(query);
            if (!matchName && !matchNeis && !matchHelper) return false;
          }
          return true;
        });
      }, [students, selectedGradeClass, selectedHelper, searchQuery]);

      const stats = useMemo(() => {
        const total = students.length;
        const edited = students.filter(s => s.hours !== s.originalHours || s.reason).length;
        const totalHours = students.reduce((acc, curr) => acc + curr.hours, 0);
        return { total, edited, totalHours };
      }, [students]);

      const openEditModal = (student) => {
        setEditingStudent(student);
        setEditHours(student.hours);
        setEditReason(student.reason || "");
        setIsModalOpen(true);
      };

      const handleSaveEdit = () => {
        if (!editingStudent) return;
        
        // 봉사시간이 차감되었는데 사유가 비어있는 상태 체크
        if (editHours !== editingStudent.originalHours && !editReason.trim()) {
          setFeedbackMsg("시간 조정 발생 시 구체적인 조정 사유를 텍스트로 꼭 입력해야 합니다.");

        const updated = students.map(s => {
          if (s.id === editingStudent.id) {
            return {
              ...s,
              hours: Number(editHours),
              reason: editReason
            };
          }
          return s;
        });

        updateStudentsState(updated);
        saveLog(
          editingStudent.name, 
          editingStudent.hours, 
          Number(editHours), 
          editReason, 
          isAdmin ? "관리자" : "담임/도우미 교사"

      const adjustHoursQuickly = (id, delta) => {
        const target = students.find(s => s.id === id);
        if (!target) return;

        const nextHours = Math.max(0, target.hours + delta);
        let autoReason = target.reason;

        if (nextHours !== target.originalHours && !target.reason) {
          autoReason = "봉사시간 조정으로 인한 담당 교사 사유 기재 대기";

          autoReason = "";
        }

        const updated = students.map(s => {
          if (s.id === id) {
            return { ...s, hours: nextHours, reason: autoReason };
          }
          return s;
        });

        updateStudentsState(updated);
        saveLog(
          target.name, 
          target.hours, 
          nextHours, 
          autoReason || "퀵 조절 패널 조정", 
          isAdmin ? "관리자" : "담임/도우미 교사"

                    <h3 className="text-xs font-bold text-text-primary uppercase tracking-wider mb-3">최근 변경 이력 로그 (실시간)</h3>
                    {editLogs.length === 0 ? (
                      <p className="text-xs text-text-secondary/60 italic">현재 기록된 변경 작업이 없습니다.</p>
                    ) : (
                      <div className="max-h-40 overflow-y-auto space-y-2 text-xs">
                        {editLogs.map(log => (
                          <div key={log.id} className="p-2.5 bg-white/5 rounded-lg border border-white/5 flex flex-col sm:flex-row justify-between gap-1">
                            <div>
                              <span className="text-text-secondary font-mono mr-2">[{log.timestamp}]</span>
                              <strong className="text-text-primary">{log.studentName}</strong> 학생 : {log.originalHours}h ➡️ <strong className="text-accent">{log.newHours}h</strong>로 조정
                            </div>
                            <div className="text-text-secondary text-right">
                              <span className="italic mr-1.5">"{log.reason}"</span>
                              <span className="px-1.5 py-0.5 rounded bg-white/10 text-[10px] font-bold text-text-primary">{log.operator}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* ----------------- [3. 통합 필터링 패널] ----------------- */}
              <div className="glass-card p-6 rounded-3xl space-y-5">
                
                {/* 실시간 텍스트 검색 */}
                <div className="relative">
                  <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none text-text-secondary">
                    🔍
                  </div>
                  <input 
                    type="text" 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    placeholder="도우미 학생 이름, 나이스 영문명, 지정 도우미 활동명 즉시 검색..."
                    className="inp w-full pl-12 pr-10 py-3.5 bg-white/20 dark:bg-black/20 border border-white/30 dark:border-white/10 rounded-2xl text-text-primary text-sm placeholder:text-text-secondary/70"
                  />
                  {searchQuery && (
                    <button 
                      onClick={() => setSearchQuery("")}
                      className="absolute inset-y-0 right-4 flex items-center text-text-secondary hover:text-text-primary"
                    >
                      ❌
                    </button>
                  )}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {/* 학급별 가로 탭 형식 필터 */}
                  <div className="space-y-2">
                    <label className="block text-xs font-bold text-text-secondary uppercase tracking-widest">
                      🏫 학급 선택 필터
                    </label>
                    <div className="flex flex-wrap gap-1.5">
                      {uniqueClasses.map(c => {
                        const isAll = c === "all";
                        const count = isAll ? students.length : students.filter(s => `${s.grade}학년 ${s.class}반` === c).length;
                        return (
                          <button 
                            key={c}
                            onClick={() => setSelectedGradeClass(c)}
                            className={`px-3 py-1.5 rounded-xl text-xs font-semibold transition-all flex items-center gap-1.5 ${
                              selectedGradeClass === c 
                                ? "bg-accent text-white shadow-md shadow-accent/20" 
                                : "bg-white/10 dark:bg-black/15 hover:bg-white/20 text-text-primary border border-white/20"
                            }`}
                          >
                            <span>{isAll ? "전체 학급" : c}</span>
                            <span className={`inline-flex items-center justify-center px-1.5 py-0.5 rounded-full text-[10px] ${
                              selectedGradeClass === c ? 'bg-white text-accent font-bold' : 'bg-white/20 text-text-secondary'
                            }`}>
                              {count}
                            </span>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* 역할별 필터 */}
                  <div className="space-y-2">
                    <label className="block text-xs font-bold text-text-secondary uppercase tracking-widest">
                      📋 도우미명 별 필터
                    </label>
                    <div className="flex flex-wrap gap-1.5">
                      {uniqueHelpers.map(h => {
                        const isAll = h === "all";
                        const count = isAll ? students.length : students.filter(s => s.helperName === h).length;
                        return (
                          <button 
                            key={h}
                            onClick={() => setSelectedHelper(h)}
                            className={`px-3 py-1.5 rounded-xl text-xs font-semibold transition-all flex items-center gap-1.5 ${
                              selectedHelper === h 
                                ? "bg-accent text-white shadow-md shadow-accent/20" 
                                : "bg-white/10 dark:bg-black/15 hover:bg-white/20 text-text-primary border border-white/20"
                            }`}
                          >
                            <span>{isAll ? "전체 도우미 역할" : h}</span>
                            <span className={`inline-flex items-center justify-center px-1.5 py-0.5 rounded-full text-[10px] ${
                              selectedHelper === h ? 'bg-white text-accent font-bold' : 'bg-white/20 text-text-secondary'
                            }`}>
                              {count}
                            </span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>

              </div>

              {/* ----------------- [학생 도우미 실시간 리스트] ----------------- */}
              <div className="glass-card rounded-3xl overflow-hidden">
                <div className="px-6 py-5 border-b border-white/20 flex items-center justify-between bg-white/5">
                  <div className="flex items-center gap-2">
                    <h2 className="text-base font-bold text-text-primary">도우미 명단 조회 및 현황</h2>
                    <span className="px-2.5 py-0.5 rounded-full bg-accent-light text-accent text-xs font-bold border border-accent/10">
                      {filteredStudents.length}명 조회됨
                    </span>
                  </div>
                  
                  <span className="text-xs text-text-secondary">
                    조정 시 우측 <span className="font-bold text-accent">사유 입력</span> 필수
                  </span>
                </div>

                {filteredStudents.length === 0 ? (
                  <div className="py-16 text-center">
                    <p className="text-sm font-semibold text-text-primary">일치하는 도우미 학생 정보가 존재하지 않습니다.</p>
                    <p className="text-xs text-text-secondary mt-1">학년/반 탭을 재선택하거나 검색어를 확인해 주세요.</p>
                  </div>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-white/5 text-[11px] font-bold text-text-secondary uppercase tracking-wider border-b border-white/10">
                          <th className="py-4 px-6">학급정보</th>
                          <th className="py-4 px-6">한글 이름</th>
                          <th className="py-4 px-6">나이스 성명 (영문)</th>
                          <th className="py-4 px-6">도우미 역할</th>
                          <th className="py-4 px-6 text-center">인정 시간 (원래 → 변경)</th>
                          <th className="py-4 px-6">변경 및 단축 상세 사유</th>
                          <th className="py-4 px-6 text-center">동작</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-white/10 text-sm">
                        {filteredStudents.map((student) => {
                          const isEdited = student.hours !== student.originalHours;
                          const hasReason = student.reason && student.reason.trim();
                          
                          return (
                            <tr 
                              key={student.id} 
                              className={`transition-colors hover:bg-white/5 ${
                                isEdited ? 'bg-amber-500/[0.03]' : ''
                              }`}
                            >
                              {/* 학급 인적사항 */}
                              <td className="py-4 px-6 whitespace-nowrap">
                                <span className="inline-flex items-center px-2.5 py-1 rounded-lg bg-white/10 text-text-primary font-bold text-xs border border-white/20">
                                  {student.grade}학년 {student.class}반 {student.number}번
                                </span>
                              </td>
                              
                              {/* 학생 성명 */}
                              <td className="py-4 px-6 font-bold text-text-primary whitespace-nowrap">
                                {student.name}
                              </td>

                              {/* 나이스 영문 */}
                              <td className="py-4 px-6 text-text-secondary text-xs font-mono whitespace-nowrap">
                                {student.neisName || "-"}
                              </td>

                              {/* 지정 도우미 활동명 */}
                              <td className="py-4 px-6 whitespace-nowrap">
                                <span className="inline-flex items-center px-2.5 py-1 rounded-lg bg-accent-light text-accent text-xs font-semibold border border-accent/10">
                                  {student.helperName}
                                </span>
                              </td>

                              {/* 봉사시간 조절 */}
                              <td className="py-4 px-6 whitespace-nowrap">
                                <div className="flex items-center justify-center gap-2.5">
                                  <button 
                                    onClick={() => adjustHoursQuickly(student.id, -1)}
                                    className="w-7 h-7 rounded-lg bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white transition-colors flex items-center justify-center font-bold text-base"
                                    title="1시간 단축"
                                  >
                                    -
                                  </button>

                                  <div className="text-center min-w-[70px]">
                                    {isEdited ? (
                                      <div className="flex flex-col items-center">
                                        <span className="text-[10px] text-text-secondary line-through">{student.originalHours}h</span>
                                        <span className="text-sm font-extrabold text-amber-500">{student.hours}시간</span>
                                      </div>
                                    ) : (
                                      <span className="font-bold text-text-primary">{student.hours}시간</span>
                                    )}
                                  </div>

                                  <button 
                                    onClick={() => adjustHoursQuickly(student.id, 1)}
                                    className="w-7 h-7 rounded-lg bg-emerald-500/10 hover:bg-emerald-500 text-emerald-500 hover:text-white transition-colors flex items-center justify-center font-bold text-base"
                                    title="1시간 증가"
                                  >
                                    +
                                  </button>
                                </div>
                              </td>

                              {/* 변경 사유 기재사항 */}
                              <td className="py-4 px-6 max-w-xs">
                                {isEdited ? (
                                  <span className={`text-xs block truncate ${hasReason ? 'text-text-primary font-medium' : 'text-red-500 font-bold'}`}>
                                    {student.reason || "⚠ 사유 미입력 (수정 필요)"}
                                  </span>
                                ) : (
                                  <span className="text-xs text-text-secondary/40 italic">변동 사항 없음</span>
                                )}
                              </td>

                              {/* 사유 편집 액션 */}
                              <td className="py-4 px-6 text-center whitespace-nowrap">
                                <div className="flex items-center justify-center gap-1.5">
                                  <button 
                                    onClick={() => openEditModal(student)}
                                    className="px-3 py-1.5 rounded-lg bg-accent text-white text-xs font-semibold hover:bg-accent-hover shadow-sm transition-all"
                                  >
                                    사유 편집
                                  </button>
                                  {isAdmin && (
                                    <button 
                                      onClick={() => handleDeleteStudent(student.id, student.name)}
                                      className="p-1.5 text-xs text-red-500 hover:bg-red-500/15 rounded-lg transition-all"
                                      title="배정 제외"
                                    >
                                      ❌
                                    </button>
                                  )}
                                </div>
                              </td>

                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
                
                <div className="bg-white/5 px-6 py-4 border-t border-white/10 text-xs text-text-secondary flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                  <span className="flex items-center gap-1.5 font-medium">
                    <span className="w-1.5 h-1.5 rounded-full bg-accent animate-ping"></span>
                    데이터는 브라우저의 안전한 로컬 저장소에 실시간 보관됩니다.
                  </span>
                  <span>명단 수정 및 삭제 처리는 우측 상단 ⚙️ 관리자 권한(9600)을 통해 수행하세요.</span>
                </div>
              </div>

            </div>
          )}

          {/* ----------------- [관리자 게이트 인증 모달 (9600)] ----------------- */}
          {isAdminGateOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
              <div className="glass-card w-full max-w-sm p-6 sm:p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                <div className="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-white/40 to-transparent"></div>
                
                <div className="text-center mb-6">
                  <span className="text-3xl block mb-2">🛡️</span>
                  <h3 className="text-lg font-bold text-text-primary">관리자 등급 승인</h3>
                  <p className="text-xs text-text-secondary mt-1">시스템 마스터 인증 비밀번호를 입력하십시오.</p>
                </div>

                <form onSubmit={handleAdminVerify} className="space-y-4">
                  <input 
                    type="password"
                    value={adminPasswordInput}
                    onChange={(e) => setAdminPasswordInput(e.target.value)}
                    placeholder="관리자 인증키 입력"
                    className="inp w-full px-4 py-3 bg-white/15 dark:bg-black/25 text-center text-lg font-mono tracking-widest text-text-primary rounded-xl border border-white/20"
                    required
                    autoFocus
                  />
                  {adminPasswordError && (
                    <p className="text-xs text-red-500 text-center font-semibold">{adminPasswordError}</p>
                  )}

                  <div className="flex gap-2 pt-2">
                    <button 
                      type="button"
                      onClick={() => { setIsAdminGateOpen(false); setAdminPasswordInput(""); setAdminPasswordError(""); }}
                      className="flex-1 py-2.5 bg-white/10 hover:bg-white/15 text-text-primary text-xs font-semibold rounded-xl transition-all"
                    >
                      취소
                    </button>
                    <button 
                      type="submit"
                      className="flex-1 py-2.5 bg-accent hover:bg-accent-hover text-white text-xs font-bold rounded-xl transition-all"
                    >
                      승인 요청
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ----------------- [봉사 상세 조절 및 사유 입력 단일 포커스 모달] ----------------- */}
          {isModalOpen && editingStudent && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
              <div className="glass-card w-full max-w-lg p-6 sm:p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                
                <div className="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>

                <div className="flex justify-between items-start mb-6">
                  <div>
                    <h3 className="text-lg font-bold text-text-primary">봉사 시간 및 사유 입력</h3>
                    <p className="text-xs text-text-secondary mt-1">봉사시간 감소 부여에 대한 명확한 사유를 텍스트로 적어 주십시오.</p>
                  </div>
                  <button 
                    onClick={() => { setIsModalOpen(false); setEditingStudent(null); setFeedbackMsg(""); }}
                    className="p-1 rounded-lg hover:bg-white/10 text-text-secondary hover:text-text-primary"
                  >
                    ❌
                  </button>
                </div>

                {/* 학생 서머리 프로필 정보 */}
                <div className="bg-accent/5 rounded-2xl p-4 border border-accent/15 mb-5">
                  <div className="grid grid-cols-2 gap-4 text-xs">
                    <div>
                      <span className="text-text-secondary block mb-0.5">대상자 정보</span>
                      <strong className="text-sm text-text-primary">
                        {editingStudent.grade}학년 {editingStudent.class}반 {editingStudent.number}번 {editingStudent.name}
                      </strong>
                    </div>
                    <div>
                      <span className="text-text-secondary block mb-0.5">나이스 성명</span>
                      <strong className="text-sm text-text-primary font-mono">{editingStudent.neisName || "-"}</strong>
                    </div>
                    <div>
                      <span className="text-text-secondary block mb-0.5">지정 도우미 활동</span>
                      <strong className="text-sm text-accent">{editingStudent.helperName}</strong>
                    </div>
                    <div>
                      <span className="text-text-secondary block mb-0.5">원래 봉사시간</span>
                      <strong className="text-sm text-text-primary">{editingStudent.originalHours}시간</strong>
                    </div>
                  </div>
                </div>

                <div className="space-y-4">
                  {/* 시간 지정 슬라이더 및 수치 제어 */}
                  <div>
                    <label className="block text-xs font-bold text-text-secondary uppercase tracking-widest mb-1.5">인정 봉사시간 선택</label>
                    <div className="flex items-center gap-3">
                      <input 
                        type="range"
                        min="0"
                        max="20"
                        value={editHours}
                        onChange={(e) => setEditHours(Number(e.target.value))}
                        className="w-full h-2 bg-white/20 rounded-lg appearance-none cursor-pointer accent-accent"
                      />
                      <div className="flex items-center border border-white/30 dark:border-white/10 rounded-xl overflow-hidden bg-white/10 px-3 py-1 shrink-0">
                        <input 
                          type="number"
                          value={editHours}
                          onChange={(e) => setEditHours(Math.max(0, Number(e.target.value)))}
                          className="w-12 bg-transparent text-center font-extrabold text-sm text-text-primary outline-none focus:ring-0"
                        />
                        <span className="text-xs text-text-secondary">시간</span>
                      </div>
                    </div>
                  </div>

                  {/* 변경 사유 텍스트 입력창 (가독성 집중 구조) */}
                  <div>
                    <label className="block text-xs font-bold text-text-secondary uppercase tracking-widest mb-2">
                      ✍️ 구체적인 시간 조정 및 활동 사유 기록
                    </label>
                    <textarea 
                      rows="4"
                      value={editReason}
                      onChange={(e) => setEditReason(e.target.value)}
                      placeholder="예) 해당 도우미 학생이 지정 날짜 활동에 참여하지 않아 활동 시간을 3시간 단축 승인합니다."
                      className="inp w-full px-4 py-3 bg-white/15 dark:bg-black/25 border border-white/30 dark:border-white/10 rounded-xl text-text-primary text-xs placeholder:text-text-secondary/50 leading-relaxed font-sans"
                    ></textarea>
                    
                    {feedbackMsg && (
                      <p className="text-xs text-red-500 font-bold mt-2 flex items-center gap-1">
                        <span>⚠</span>
                        <span>{feedbackMsg}</span>
                      </p>
                    )}
                  </div>
                </div>

                <div className="mt-6 flex items-center justify-end gap-2.5">
                  <button 
                    onClick={() => { setIsModalOpen(false); setEditingStudent(null); setFeedbackMsg(""); }}
                    className="px-4 py-2 bg-white/10 hover:bg-white/15 text-text-primary text-xs font-semibold rounded-xl transition-all"
                  >
                    닫기
                  </button>
                  <button 
                    onClick={handleSaveEdit}
                    className="px-5 py-2 bg-accent hover:bg-accent-hover text-white text-xs font-bold rounded-xl transition-all shadow-md shadow-accent/20"
                  >
                    조정 완료 및 저장
                  </button>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
