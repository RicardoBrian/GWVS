      { id: 's25', grade: 3, class: 3, number: 7, neisName: "LI DONGRAN", name: "이동염", helperName: "급식 도우미", hours: 5, originalHours: 5, reason: "" },
      { id: 's26', grade: 3, class: 3, number: 8, neisName: "SONG GUANXU", name: "송관욱", helperName: "특별실 분리수거 도우미", hours: 5, originalHours: 5, reason: "" },

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false); 
      const [password, setPassword] = useState("");
      const [passwordError, setPasswordError] = useState("");
      
      const [isAdminGateOpen, setIsAdminGateOpen] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState("");
      const [adminPasswordError, setAdminPasswordError] = useState("");

      const [students, setStudents] = useState([]);
      const [searchQuery, setSearchQuery] = useState("");
      
      const [selectedGradeClass, setSelectedGradeClass] = useState("all");
      const [selectedHelper, setSelectedHelper] = useState("all");
      
      const [editLogs, setEditLogs] = useState([]);
      const [selectedLogs, setSelectedLogs] = useState({});

      const [newStudent, setNewStudent] = useState({
        grade: "", class: "", number: "", neisName: "", name: "", helperName: "급식 도우미", hours: 5
      });

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingStudent, setEditingStudent] = useState(null);
      const [editHours, setEditHours] = useState(0);
      const [editReason, setEditReason] = useState("");
      const [feedbackMsg, setFeedbackMsg] = useState("");

      const [alertToast, setAlertToast] = useState(null);
      const [liveTime, setLiveTime] = useState("");

      // 실시간 클라우드 연동 리스너 (경로 보정으로 기기 간 동기화 정합성 해결)
      useEffect(() => {
        const isAuth = sessionStorage.getItem("portal_auth");
        if (isAuth === "true") {
          setIsAuthenticated(true);
        }
        
        const isAdminSession = sessionStorage.getItem("portal_admin_auth");
        if (isAdminSession === "true") {
          setIsAdmin(true);
        }

        if (isFirebaseActive && db) {
          // RULE 3 - 선인증 후 쿼리 작동
          auth.signInAnonymously().then(() => {
            
            // 공용 연동 가이드라인에 부합하는 컬렉션 경로 바인딩
            const unsubscribeStudents = db.collection(studentsColPath).onSnapshot(
              (snapshot) => {
                if (snapshot.empty) {
                  // DB가 완전 비어있을 경우 초기 데이터 업로드 동기화
                  DEFAULT_STUDENTS.forEach(async (s) => {
                    await db.collection(studentsColPath).doc(s.id).set(s);
                  });
                } else {
                  const items = snapshot.docs.map(doc => doc.data());
                  // 학급 정보 정렬
                  items.sort((a, b) => {
                    if (a.grade !== b.grade) return a.grade - b.grade;
                    if (a.class !== b.class) return a.class - b.class;
                    return a.number - b.number;
                  });
                  setStudents(items);
                }
              },
              (err) => {
                console.error("학생 명단 실시간 수신 실패 (권한 점검 필요):", err);
                loadFromLocalStorage();
              }
            );

            // 로그 실시간 컬렉션 바인딩
            const unsubscribeLogs = db.collection(logsColPath).onSnapshot(
              (snapshot) => {
                const logsList = snapshot.docs.map(doc => doc.data());
                logsList.sort((a, b) => {
                  const idA = a.id ? a.id.split('_')[1] : 0;
                  const idB = b.id ? b.id.split('_')[1] : 0;
                  return idB - idA;
                });
                setEditLogs(logsList);
              },
              (err) => {
                console.error("로그 내역 실시간 수신 실패 (권한 점검 필요):", err);
              }
            );

            return () => {
              unsubscribeStudents();
              unsubscribeLogs();
            };
          }).catch(err => {
            console.error("Firebase 익명 로그인 불가, 로컬 저장소 모드로 전환.", err);
            loadFromLocalStorage();
          });
        } else {
          loadFromLocalStorage();
        }

        function loadFromLocalStorage() {
          const savedData = localStorage.getItem("helper_students_data_v4");
          if (savedData) {
            try {
              setStudents(JSON.parse(savedData));
            } catch(e) {
              setStudents(DEFAULT_STUDENTS);
            }
          } else {
            setStudents(DEFAULT_STUDENTS);
          }

          const savedLogs = localStorage.getItem("helper_students_logs_v4");
          if (savedLogs) {
            try {
              setEditLogs(JSON.parse(savedLogs));
            } catch(e) {
              setEditLogs([]);
            }
          }
        }

        const updateClock = () => {
          const now = new Date();
          setLiveTime(now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
        };
        updateClock();
        const interval = setInterval(updateClock, 1000);
        return () => clearInterval(interval);
      }, []);

      const triggerToast = (msg, type = "success") => {
        setAlertToast({ msg, type });
        setTimeout(() => setAlertToast(null), 3000);
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (password === "1985") {
          setIsAuthenticated(true);
          sessionStorage.setItem("portal_auth", "true");
          triggerToast("관산중학교 봉사도우미 시스템 접속에 성공하였습니다.", "success");
        } else {
          setPasswordError("비밀번호가 올바르지 않습니다. 다시 입력하세요.");
          triggerToast("접속 실패", "danger");
        }
      };

      const handleAdminVerify = (e) => {
        e.preventDefault();
        if (adminPasswordInput === "9600") {
          setIsAdmin(true);
          setIsAdminGateOpen(false);
          setAdminPasswordInput("");
          setAdminPasswordError("");
          sessionStorage.setItem("portal_admin_auth", "true");
          triggerToast("시스템 관리자 모드가 활성화되었습니다.", "success");
        } else {
          setAdminPasswordError("관리자 승인 비밀번호가 일치하지 않습니다.");
          triggerToast("관리자 인증 실패", "danger");
        }
      };

      const updateStudentsState = async (newStudents) => {
        setStudents(newStudents);
        if (isFirebaseActive && db) {
          const batch = db.batch();
          newStudents.forEach(s => {
            const docRef = db.collection(studentsColPath).doc(s.id);
            batch.set(docRef, s);
          });
          await batch.commit();
        } else {
          localStorage.setItem("helper_students_data_v4", JSON.stringify(newStudents));
        }
      };

      const saveLog = async (studentName, originalHours, newHours, reason, operator = "일반 사용자") => {
        const newLog = {
          id: `log_${Date.now()}`,
          timestamp: new Date().toLocaleString('ko-KR'),
          studentName,
          originalHours,
          newHours,
          reason,
          operator
        };
        const updatedLogs = [newLog, ...editLogs];
        setEditLogs(updatedLogs);

        if (isFirebaseActive && db) {
          await db.collection(logsColPath).doc(newLog.id).set(newLog);
        } else {
          localStorage.setItem("helper_students_logs_v4", JSON.stringify(updatedLogs));
        }
      };

      const handleClearSelectedLogs = async () => {
        const checkedIds = Object.keys(selectedLogs).filter(id => selectedLogs[id]);
        if (checkedIds.length === 0) {
          triggerToast("선택된 이력 로그 항목이 없습니다.", "danger");
          return;
        }

        if (window.confirm(`선택한 ${checkedIds.length}건의 시간 수정 이력을 확인 완료하고 완전히 삭제하시겠습니까?`)) {
          const remainingLogs = editLogs.filter(log => !selectedLogs[log.id]);
          setEditLogs(remainingLogs);
          setSelectedLogs({});

          if (isFirebaseActive && db) {
            const batch = db.batch();
            checkedIds.forEach(id => {
              const docRef = db.collection(logsColPath).doc(id);
              batch.delete(docRef);
            });
            await batch.commit();
          } else {
            localStorage.setItem("helper_students_logs_v4", JSON.stringify(remainingLogs));
          }
          triggerToast("선택된 변경 이력이 정상적으로 삭제 처리되었습니다.");
        }
      };

      const handleToggleLogCheck = (id) => {
        setSelectedLogs(prev => ({
          ...prev,
          [id]: !prev[id]
        }));
      };

      const handleAllLogsCheck = (checked) => {
        const nextLogsState = {};
        if (checked) {
          editLogs.forEach(log => {
            nextLogsState[log.id] = true;
          });
        }
        setSelectedLogs(nextLogsState);
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setIsAdmin(false);
        sessionStorage.removeItem("portal_auth");
        sessionStorage.removeItem("portal_admin_auth");
        setPassword("");
        setPasswordError("");
        triggerToast("안전하게 접속 종료되었습니다.");
      };

      const handleExitAdminMode = () => {
        setIsAdmin(false);
        sessionStorage.removeItem("portal_admin_auth");
        triggerToast("교사 일반 모드로 전환되었습니다.");
      };

      const handleResetData = async () => {
        if (window.confirm("주의! 수정된 모든 내용을 지우고 원래 배정 명단으로 전체 초기화하시겠습니까?")) {
          setSelectedLogs({});
          if (isFirebaseActive && db) {
            const studentSnaps = await db.collection("students").get();
            const logSnaps = await db.collection("logs").get();
            
            const batch = db.batch();
            studentSnaps.docs.forEach(doc => batch.delete(doc.ref));
            logSnaps.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();

            const nextBatch = db.batch();
            DEFAULT_STUDENTS.forEach(s => {
              const ref = db.collection("students").doc(s.id);
              nextBatch.set(ref, s);
            });
            await nextBatch.commit();
          } else {
            updateStudentsState(DEFAULT_STUDENTS);
            setEditLogs([]);
            localStorage.removeItem("helper_students_logs_v4");
          }
          triggerToast("모든 데이터가 완벽하게 복원 및 초기화되었습니다.", "success");
        }
      };

      const handleCsvImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            const data = results.data;
            if (data.length === 0) {
              triggerToast("파싱 가능한 데이터 행이 존재하지 않는 CSV 파일입니다.", "danger");
              return;
            }

            try {
              const formatted = data.map((row, idx) => {
                const getVal = (candidates) => {
                  const match = Object.keys(row).find(k => candidates.some(c => k.trim().replace(/\s/g, '').includes(c)));
                  return match ? row[match].trim() : "";
                };

                const parsedGrade = parseInt(getVal(["학년", "grade"])) || 1;
                const parsedClass = parseInt(getVal(["반", "class"])) || 1;
                const parsedNum = parseInt(getVal(["번호", "number", "no"])) || 1;
                const parsedHours = parseInt(getVal(["봉사시간", "시간", "hours"])) || 5;

                return {
                  id: `csv_${idx}_${Date.now()}`,
                  grade: parsedGrade,
                  class: parsedClass,
                  number: parsedNum,
                  neisName: getVal(["나이스성명", "영문성명", "neis"]),
                  name: getVal(["한글이름", "이름", "name"]),
                  helperName: getVal(["도우미명", "도우미역할", "도우미", "role"]) || "일반 도우미",
                  hours: parsedHours,
                  originalHours: parsedHours,
                  reason: getVal(["봉사시간변경사유", "변경사유", "사유", "reason"]) || ""
                };
              });

              updateStudentsState(formatted);
              triggerToast(`성공적으로 ${formatted.length}명의 도우미 정보를 업로드 연동했습니다.`, "success");
            } catch (err) {
              console.error(err);
              triggerToast("CSV 구조 분석 중 실패했습니다. 구조를 재점검하세요.", "danger");
            }
          },
          error: (err) => {
            triggerToast("파일 데이터 로드 실패", "danger");
          }
        });
      };

      const handleCsvExport = () => {
        if (students.length === 0) {
          triggerToast("출력 대상 데이터가 존재하지 않습니다.", "danger");
          return;
        }

        const csvHeaders = ["학년", "반", "번호", "나이스 성명", "한글 이름", "도우미명", "봉사시간", "봉사시간 변경 사유"];
        const rows = students.map(s => [
          s.grade,
          s.class,
          s.number,
          s.neisName,
          s.name,
          s.helperName,
          s.hours,
          s.reason || ""
        ]);

        const csvContent = [csvHeaders, ...rows].map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `도우미_봉사조정명세_${new Date().toISOString().slice(0, 10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("엑셀 호환 CSV 백업 파일의 다운로드를 시작했습니다.");
      };

      const handleAddStudent = (e) => {
        e.preventDefault();
        if (!newStudent.grade || !newStudent.class || !newStudent.number || !newStudent.name) {
          triggerToast("학생의 학적 기본 사항(학년/반/번호/이름)을 빠짐없이 등록하세요.", "danger");
          return;
        }

        const added = {
          id: `manual_${Date.now()}`,
          grade: Number(newStudent.grade),
          class: Number(newStudent.class),
          number: Number(newStudent.number),
          neisName: newStudent.neisName || newStudent.name,
          name: newStudent.name,
          helperName: newStudent.helperName,
          hours: Number(newStudent.hours),
          originalHours: Number(newStudent.hours),
          reason: ""
        };

        const updated = [...students, added];
        updateStudentsState(updated);
        setNewStudent({
          grade: "", class: "", number: "", neisName: "", name: "", helperName: "급식 도우미", hours: 5
        });
        triggerToast(`${added.name} 학생 도우미 명단에 추가 완료!`);
      };

      const handleDeleteStudent = (id, name) => {
        if (window.confirm(`${name} 도우미를 관리 대상에서 영구적으로 제외 처리하겠습니까?`)) {
          if (isFirebaseActive && db) {
            db.collection(studentsColPath).doc(id).delete().then(() => {
              triggerToast(`${name} 학생이 명단에서 영구 제외되었습니다.`, "danger");
            }).catch(err => {
              console.error("삭제 실패:", err);
            });
          } else {
            const updated = students.filter(s => s.id !== id);
            updateStudentsState(updated);
            triggerToast(`${name} 학생이 명단에서 영구 제외되었습니다.`, "danger");
          }
        }
      };

      const uniqueClasses = useMemo(() => {
        const classes = students.map(s => `${s.grade}학년 ${s.class}반`);
        return ["all", ...new Set(classes)].sort((a, b) => {
          if (a === "all") return -1;
          if (b === "all") return 1;
          return a.localeCompare(b, 'ko', { numeric: true });
        });
      }, [students]);

      const uniqueHelpers = useMemo(() => {
        const helpers = students.map(s => s.helperName).filter(Boolean);
        return ["all", ...new Set(helpers)];
      }, [students]);

      const filteredStudents = useMemo(() => {
        return students.filter(s => {
          if (selectedGradeClass !== "all") {
            const classStr = `${s.grade}학년 ${s.class}반`;
            if (classStr !== selectedGradeClass) return false;
          }
          if (selectedHelper !== "all") {
            if (s.helperName !== selectedHelper) return false;
          }
          if (searchQuery.trim() !== "") {
            const query = searchQuery.toLowerCase();
            const matchName = s.name.toLowerCase().includes(query);
            const matchNeis = s.neisName.toLowerCase().includes(query);
            const matchHelper = s.helperName.toLowerCase().includes(query);
            if (!matchName && !matchNeis && !matchHelper) return false;
          }
          return true;
        });
      }, [students, selectedGradeClass, selectedHelper, searchQuery]);

      const stats = useMemo(() => {
        const total = students.length;
        const edited = students.filter(s => s.hours !== s.originalHours || s.reason).length;
        return { total, edited };
      }, [students]);

      const openEditModal = (student) => {
        setEditingStudent(student);
        setEditHours(student.hours);
        setEditReason(student.reason || "");
        setIsModalOpen(true);
      };

      const handleSaveEdit = () => {
        if (!editingStudent) return;
        
        if (editHours !== editingStudent.originalHours && !editReason.trim()) {
          setFeedbackMsg("시간 조정 발생 시 사유 내용을 반드시 입력하셔야 합니다.");
          return;
        }

        if (isFirebaseActive && db) {
          db.collection(studentsColPath).doc(editingStudent.id).update({
            hours: Number(editHours),
            reason: editReason
          }).then(() => {
            saveLog(
              editingStudent.name, 
              editingStudent.hours, 
              Number(editHours), 
              editReason, 
              isAdmin ? "관리자" : "담임/도우미 교사"
            );
            setIsModalOpen(false);
            setEditingStudent(null);
            setFeedbackMsg("");
            triggerToast(`${editingStudent.name} 학생의 도우미 정보가 성공적으로 반영되었습니다.`);
          }).catch(err => {
            console.error("수정 실패:", err);
          });
        } else {
          const updated = students.map(s => {
            if (s.id === editingStudent.id) {
              return {
                ...s,
                hours: Number(editHours),
                reason: editReason
              };
            }
            return s;
          });
          updateStudentsState(updated);
          saveLog(
            editingStudent.name, 
            editingStudent.hours, 
            Number(editHours), 
            editReason, 
            isAdmin ? "관리자" : "담임/도우미 교사"
          );
          setIsModalOpen(false);
          setEditingStudent(null);
          setFeedbackMsg("");
          triggerToast(`${editingStudent.name} 학생의 도우미 정보가 성공적으로 반영되었습니다.`);
        }
      };

      const adjustHoursQuickly = (id, delta) => {
        const target = students.find(s => s.id === id);
        if (!target) return;

        const nextHours = Math.max(0, target.hours + delta);
        let autoReason = target.reason;

        if (nextHours !== target.originalHours && !target.reason) {
          autoReason = "활동 확인 후 인정 시간 수동 제어";
        } else if (nextHours === target.originalHours) {
          autoReason = "";
        }

        if (isFirebaseActive && db) {
          db.collection(studentsColPath).doc(id).update({
            hours: nextHours,
            reason: autoReason
          }).then(() => {
            saveLog(
              target.name, 
              target.hours, 
              nextHours, 
              autoReason || "퀵 조정 기능을 이용함", 
              isAdmin ? "관리자" : "담임/도우미 교사"
            );
            triggerToast("인정 시간을 신속하게 조정했습니다.");
          });
        } else {
          const updated = students.map(s => {
            if (s.id === id) {
              return { ...s, hours: nextHours, reason: autoReason };
            }
            return s;
          });
          updateStudentsState(updated);
          saveLog(
            target.name, 
            target.hours, 
            nextHours, 
            autoReason || "퀵 조정 기능을 이용함", 
            isAdmin ? "관리자" : "담임/도우미 교사"
          );
          triggerToast("인정 시간을 신속하게 조정했습니다.");
        }
      };

      return (
        <div className="min-h-screen pb-16 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto pt-6 text-text-primary">
          
          {/* Toast 알림 레이어 */}
          {alertToast && (
            <div className={`fixed top-6 right-6 z-50 flex items-center gap-2.5 px-6 py-4.5 rounded-2xl shadow-2xl backdrop-blur-md transition-all duration-300 transform translate-y-0 text-white font-normal text-base ${
              alertToast.type === 'danger' ? 'bg-red-600/95 shadow-red-600/20' : 'bg-emerald-600/95 shadow-emerald-600/20'
            }`}>
              {alertToast.type === 'danger' ? "🚨" : "✅"}
              <span className="ml-1.5 font-light">{alertToast.msg}</span>
            </div>
          )}

          {/* ----------------- [1. 관산중학교 전용 로그인 게이트 (1985)] ----------------- */}
          {!isAuthenticated ? (
            <div className="flex flex-col items-center justify-center min-h-[85vh] py-12">
              <div className="glass-card w-full max-w-md p-8 sm:p-10 rounded-3xl relative overflow-hidden border border-white/35">
                <div className="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-white/50 to-transparent"></div>
                
                <div className="text-center mb-8">
                  <div className="inline-flex items-center justify-center w-24 h-24 rounded-2xl bg-white/40 dark:bg-black/25 mb-4 border border-white/25 overflow-hidden">
                    <img 
                      src="logo.png" 
                      alt="관산중학교" 
                      onError={(e) => { 
                        e.target.onerror = null;
                        e.target.src = "https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=150"; 
                      }} 
                      className="w-full h-full object-cover"
                    />
                  </div>
                  <h1 className="text-xl sm:text-2xl font-light tracking-tight mb-2 text-text-primary leading-snug">
                    관산중학교 <br/>봉사활동 도우미 관리페이지
                  </h1>
                </div>

                <form onSubmit={handleLoginSubmit} className="space-y-6">
                  <div>
                    <label className="block text-sm font-normal text-text-secondary mb-2">비밀번호</label>
                    <input 
                      type="password"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      placeholder="비밀번호 입력"
                      className="inp w-full px-4 py-3.5 bg-white/40 dark:bg-black/35 border border-white/40 dark:border-white/10 rounded-xl text-text-primary placeholder:text-text-secondary/40 text-center text-lg font-mono tracking-widest font-normal"
                      required
                      autoFocus
                    />
                    {passwordError && (
                      <p className="mt-2.5 text-xs text-red-600 font-normal flex items-center gap-1.5">
                        <span>⚠</span>
                        <span>{passwordError}</span>
                      </p>
                    )}
                  </div>

                  <button 
                    type="submit" 
                    className="w-full py-4 px-6 rounded-xl bg-accent hover:bg-accent-hover text-white font-normal text-base transition-all shadow-lg shadow-accent/25 hover:shadow-accent/40 flex items-center justify-center hover:-translate-y-0.5 active:translate-y-0"
                  >
                    <span>접속</span>
                  </button>
                </form>

                <div className="mt-8 text-center border-t border-white/10 pt-5">
                  <span className="text-xs text-text-secondary font-normal">
                    비밀번호는 담당자에게 문의하십시오.
                  </span>
                </div>
              </div>
            </div>
          ) : (
            
            // ----------------- [2. 마스터 대시보드 인터페이스] -----------------
            <div className="space-y-6">
              
              {/* 상단 통합 네비게이션 헤더 */}
              <header className="glass-card p-6 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-3">
                    <img 
                      src="logo.png" 
                      alt="관산중 로고" 
                      onError={(e) => { 
                        e.target.onerror = null;
                        e.target.src = "https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=150"; 
                      }} 
                      className="w-11 h-11 object-cover rounded-lg"
                    />
                    <div>
                      <div className="flex items-center gap-1.5">
                        <span className="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span className="text-xs font-normal text-emerald-700 dark:text-emerald-400 uppercase tracking-widest">
                          {isAdmin ? "보안 마스터 모드 활성" : "실시간 관리 모드"}
                        </span>
                      </div>
                      <h1 className="text-lg sm:text-xl font-light tracking-tight">관산중학교 봉사활동 도우미 포탈</h1>
                    </div>
                  </div>
                </div>

                <div className="flex flex-wrap items-center justify-center gap-3">
                  {/* 라이브 클럭 */}
                  <div className="px-3.5 py-2 bg-white/20 dark:bg-black/20 border border-white/30 dark:border-white/10 rounded-xl text-xs font-mono font-normal text-text-secondary flex items-center gap-1.5">
                    <span className="w-1.5 h-1.5 rounded-full bg-accent"></span>
                    <span>{liveTime || "00:00:00"}</span>
                  </div>

                  {/* 관리자 전환 버튼 (⚙) */}
                  {!isAdmin ? (
                    <button 
                      onClick={() => setIsAdminGateOpen(true)}
                      className="p-2.5 bg-white/20 hover:bg-white/35 border border-white/30 dark:border-white/10 text-text-primary rounded-xl text-xs font-normal flex items-center gap-1.5 transition-all shadow-sm"
                      title="관리자 전용 설정 진입"
                    >
                      <span className="text-base">⚙️</span>
                      <span>관리자 포탈</span>
                    </button>
                  ) : (
                    <button 
                      onClick={handleExitAdminMode}
                      className="px-3.5 py-2.5 bg-amber-500/15 hover:bg-amber-500/25 border border-amber-500/35 text-amber-800 dark:text-amber-400 rounded-xl text-xs font-normal flex items-center gap-1.5 transition-all"
                    >
                      <span>🔄 교사 모드로 복귀</span>
                    </button>
                  )}

                  <button 
                    onClick={handleLogout}
                    className="px-4 py-2.5 rounded-xl bg-red-600/10 hover:bg-red-600 text-red-600 hover:text-white border border-red-600/20 text-xs font-normal flex items-center gap-1.5 transition-all"
                  >
                    <span>접속 종료</span>
                  </button>
                </div>
              </header>

              {/* 통계 요약 카드 세션 */}
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div className="glass-card p-6 rounded-2xl flex items-center justify-between">
                  <div>
                    <span className="text-xs font-normal text-text-secondary block mb-1">등록 도우미 인원</span>
                    <span className="text-2xl sm:text-3xl font-light text-text-primary">{stats.total}명</span>
                  </div>
                  <div className="w-12 h-12 rounded-xl bg-accent-light text-accent flex items-center justify-center text-lg">
                    👥
                  </div>
                </div>

                <div className="glass-card p-6 rounded-2xl flex items-center justify-between">
                  <div>
                    <span className="text-xs font-normal text-text-secondary block mb-1">관리 등급 권한</span>
                    <span className="text-base sm:text-lg font-light text-text-primary">
                      {isAdmin ? "시스템 총괄 최고관리자" : "일반 교직원 및 담임교사"}
                    </span>
                  </div>
                  <div className="w-12 h-12 rounded-xl bg-emerald-500/10 text-emerald-600 flex items-center justify-center text-lg">
                    🛡️
                  </div>
                </div>
              </div>

              {/* ----------------- [4. 관리자 전용 제어반] ----------------- */}
              {isAdmin && (
                <div className="glass-card p-6 rounded-3xl space-y-6 border-t-4 border-t-accent shadow-lg">
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div>
                      <h2 className="text-base sm:text-lg font-normal text-text-primary flex items-center gap-2">
                        <span>🛡️</span>
                        <span>시스템 총괄 마스터 관리 콘솔</span>
                      </h2>
                      <p className="text-xs text-text-secondary font-normal mt-1">
                        전체 도우미 명단 데이터의 영구 추가/삭제와 CSV 파일 입출력 마스터 제어를 관리합니다.
                      </p>
                    </div>

                    <div className="flex items-center gap-2">
                      <button 
                        onClick={handleResetData}
                        className="px-4 py-2 bg-red-600/10 hover:bg-red-600 text-red-600 hover:text-white rounded-xl text-xs font-normal transition-all border border-red-600/20"
                      >
                        전체 데이터 리셋
                      </button>
                    </div>
                  </div>

                  {/* 도우미 추가 및 CSV 관리 */}
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    {/* 도우미 추가 폼 */}
                    <form onSubmit={handleAddStudent} className="lg:col-span-7 bg-white/10 dark:bg-black/15 p-5 rounded-2xl border border-white/20 dark:border-white/5 space-y-4">
                      <h3 className="text-xs sm:text-sm font-normal text-text-primary uppercase tracking-wider">🛠️ 도우미 개별 배정 추가</h3>
                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <div>
                          <label className="block text-[11px] font-normal text-text-secondary mb-1">학년</label>
                          <input 
                            type="number"
                            placeholder="학년 입력"
                            value={newStudent.grade}
                            onChange={(e) => setNewStudent({...newStudent, grade: e.target.value})}
                            className="inp w-full px-3 py-2 bg-white/20 dark:bg-black/30 text-xs sm:text-sm rounded-lg text-text-primary border border-white/20 font-normal"
                            required
                          />
                        </div>
                        <div>
                          <label className="block text-[11px] font-normal text-text-secondary mb-1">반</label>
                          <input 
                            type="number"
                            placeholder="반 입력"
                            value={newStudent.class}
                            onChange={(e) => setNewStudent({...newStudent, class: e.target.value})}
                            className="inp w-full px-3 py-2 bg-white/20 dark:bg-black/30 text-xs sm:text-sm rounded-lg text-text-primary border border-white/20 font-normal"
                            required
                          />
                        </div>
                        <div>
                          <label className="block text-[11px] font-normal text-text-secondary mb-1">번호</label>
                          <input 
                            type="number"
                            placeholder="번호 입력"

          {isModalOpen && editingStudent && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/75 backdrop-blur-md">
              <div className="glass-card w-full max-w-lg p-6 sm:p-8 rounded-3xl shadow-2xl relative overflow-hidden border border-white/20">
                
                <div className="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>

                <div className="flex justify-between items-start mb-5">
                  <h3 className="text-base sm:text-lg font-normal text-text-primary">✏️ 봉사시간 수정 및 사유 기재</h3>
                  <button 
                    onClick={() => { setIsModalOpen(false); setEditingStudent(null); setFeedbackMsg(""); }}
                    className="p-1.5 rounded-lg hover:bg-white/20 text-text-secondary hover:text-text-primary text-sm"
                  >
                    ❌
                  </button>
                </div>

                {/* 대상 도우미 프로필 정보 카드 */}
                <div className="bg-accent/5 dark:bg-black/30 rounded-2xl p-4 border border-accent/20 dark:border-white/10 mb-5 text-sm">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <span className="text-text-secondary text-xs sm:text-sm font-normal block mb-0.5">대상 도우미</span>
                      <strong className="text-sm sm:text-base font-normal text-text-primary">
                        {editingStudent.grade}학년 {editingStudent.class}반 {editingStudent.number}번 {editingStudent.name}
                      </strong>
                    </div>
                    <div>
                      <span className="text-text-secondary text-xs sm:text-sm font-normal block mb-0.5">나이스 성명</span>
                      <strong className="text-sm sm:text-base font-normal text-text-primary font-mono">{editingStudent.neisName || "-"}</strong>
                    </div>
                    <div>
                      <span className="text-text-secondary text-xs sm:text-sm font-normal block mb-0.5">도우미 명칭</span>
                      <strong className="text-sm sm:text-base font-normal text-accent">{editingStudent.helperName}</strong>
                    </div>
                    <div>
                      <span className="text-text-secondary text-xs sm:text-sm font-normal block mb-0.5">기존 인정시간</span>
                      <strong className="text-sm sm:text-base font-normal text-text-primary">{editingStudent.originalHours}시간</strong>
                    </div>
                  </div>
                </div>

                <div className="space-y-5">
                  {/* 슬라이더 제어 */}
                  <div>
                    <label className="block text-xs sm:text-sm font-normal text-text-secondary uppercase tracking-widest mb-2">변경 반영 봉사 시간</label>
                    <div className="flex items-center gap-3">
                      <input 
                        type="range"
                        min="0"
                        max="20"
                        value={editHours}
                        onChange={(e) => setEditHours(Number(e.target.value))}
                        className="w-full h-2 bg-white/30 dark:bg-black/40 rounded-lg appearance-none cursor-pointer accent-accent"
                      />
                      <div className="flex items-center border border-white/40 dark:border-white/10 rounded-xl overflow-hidden bg-white/20 dark:bg-black/20 px-3 py-1.5 shrink-0">
                        <input 
                          type="number"
                          value={editHours}
                          onChange={(e) => setEditHours(Math.max(0, Number(e.target.value)))}
                          className="w-12 bg-transparent text-center font-normal text-sm text-text-primary outline-none focus:ring-0"
                        />
                        <span className="text-xs sm:text-sm font-normal text-text-secondary">시간</span>
                      </div>
                    </div>
                  </div>

                  {/* 사유 작성 기재부 */}
                  <div>
                    <label className="block text-xs sm:text-sm font-normal text-text-secondary uppercase tracking-widest mb-2">
                      시간 조정 사유 작성
                    </label>
                    <textarea 
                      rows="4"
                      value={editReason}
                      onChange={(e) => setEditReason(e.target.value)}
                      placeholder="예시) 활동 불성실로 인한 시간 단축 등"
                      className="inp w-full px-4 py-3 bg-white/40 dark:bg-black/35 border border-white/40 dark:border-white/10 rounded-xl text-text-primary text-xs sm:text-sm font-normal placeholder:text-text-secondary/50 leading-relaxed"
                    ></textarea>
                    
                    {feedbackMsg && (
                      <p className="text-xs sm:text-sm text-red-600 font-normal mt-2.5 flex items-center gap-1.5">
                        <span>⚠️</span>
                        <span>{feedbackMsg}</span>
                      </p>
                    )}
                  </div>
                </div>

                <div className="mt-6 flex items-center justify-end gap-2.5">
                  <button 
                    onClick={() => { setIsModalOpen(false); setEditingStudent(null); setFeedbackMsg(""); }}
                    className="px-4 py-2.5 bg-white/20 hover:bg-white/30 text-text-primary text-xs sm:text-sm font-bold rounded-xl transition-all border border-white/10"
                  >
                    조정 취소
                  </button>
                  <button 
                    onClick={handleSaveEdit}
                    className="px-5 py-2.5 bg-accent hover:bg-accent-hover text-white text-xs sm:text-sm font-bold rounded-xl transition-all shadow-md shadow-accent/20"
                  >
                    조정 변경사항 저장
                  </button>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
